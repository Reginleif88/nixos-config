name: Flake Update

on:
  schedule:
    - cron: "0 8,20 * * *" # Every 12h at 08:00 and 20:00 UTC (10:00 and 22:00 Paris)
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: flake-update
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake.lock
        run: nix flake update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "flake.lock: daily update"
          branch: flake-update
          title: "flake.lock: daily update"
          body: |
            Automated daily `nix flake update`.

            Pull and rebuild to apply:
            ```
            git pull
            sudo nixos-rebuild switch --flake .#desktop
            ```

            ## Disabled features to retry
            - [ ] **hyprbars patch** — check if `hyprland-plugins` caught up to Hyprland; if so, remove `overrideAttrs` wrapper in `home/hyprland.nix`
            - [ ] **winboat** — switch from AppImage overlay to `pkgs.winboat` in `home/apps.nix` + `overlays/default.nix` (waiting for Go cross-compilation fix in nixpkgs)
          delete-branch: true
